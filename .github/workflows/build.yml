name: Build Driver Realtek

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Mostra a estrutura de arquivos no log para conferirmos
      - name: List Repository Files
        run: |
          echo "=== Lista de Arquivos no Repositório ==="
          ls -la

      # 3. Cria o link simbólico para resolver o erro do dm.h
      - name: Create Symlinks
        run: |
          ln -sf rtl8723be rtl8723ae || true

      # 4. Tenta compilar via Xcode se encontrar o projeto, senão usa o Make
      - name: Compile Project
        run: |
          if [ -d "*.xcodeproj" ] || [ -f "*.xcodeproj" ]; then
            echo "Projeto Xcode encontrado. Compilando..."
            xcodebuild -project *.xcodeproj -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
          elif [ -f "Makefile" ] || [ -f "makefile" ]; then
            echo "Makefile encontrado. Compilando com make..."
            make
          else
            echo "Nenhum Makefile ou Xcode project encontrado no diretório raiz."
            exit 1
          fi

      # 5. Salva o resultado
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kext-Build
          path: |
            build/Release/*.kext
            *.kext
