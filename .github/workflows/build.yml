name: Build RTL8723BE Kext

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-driver:
    runs-on: macos-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Compilar Kext para Monterey e Ventura
        run: |
          cd linux/rtl8723be
          # Limpeza prévia para garantir que não haja restos de compilações anteriores
          make clean
          # Executa o make
          make
        env:
          # Passamos a variável pro Makefile entender o SDK atual
          SDKPATH: $(xcrun --sdk macosx --show-sdk-path)

      - name: Compactar Kext Corretamente
        run: |
          cd linux/rtl8723be
          zip -r ../../RTL8723BE_MacDriver.kext.zip RTL8723BE_MacDriver.kext

      - name: Upload do Artefato (Kext)
        uses: actions/upload-artifact@v4
        with:
          name: RTL8723BE_MacDriver_Monterey_Ventura
          path: RTL8723BE_MacDriver.kext.zip
