name: Build Driver Realtek (Make)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. Baixa o código do seu repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cria a symlink da Realtek para evitar o erro do dm.h
      - name: Prepare Symlinks
        run: |
          ln -sf rtl8723be rtl8723ae || true

      # 3. Baixa os cabeçalhos do Kernel do macOS (MacKernelSDK)
      - name: Install MacKernelSDK
        run: |
          git clone --depth=1 https://github.com/acidanthera/MacKernelSDK.git

      # 4. Compila usando o Make
      - name: Compile with Make
        run: |
          make

      # 5. Salva os arquivos compilados (.kext ou .o)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Realtek-Driver-Build
          path: |
            *.kext
            **/*.kext
            *.o
