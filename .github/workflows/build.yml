name: Build RealtekPCI-E_Version Kext

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Firmwares Realtek (RTL8723BE)
        run: |
          mkdir -p firmware
          cd firmware
          # Baixa os firmwares do repositório oficial do Larry Finger / Linux Kernel
          curl -sLO "https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain/rtlwifi/rtl8723befw.bin" || true
          curl -sLO "https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain/rtlwifi/rtl8723befw_36.bin" || true
          ls -lh *.bin || true

      - name: Compilar Kext (RTL8723BE)
        run: |
          export SDKPATH=$(xcrun --sdk macosx --show-sdk-path)
          export CFLAGS="-w -fmax-errors=1 -mmacosx-version-min=11.0 -isysroot $SDKPATH"
          
          make clean || true
          make all
          
          if [ ! -d "RealtekPCI-E_Version.kext" ]; then
            echo "❌ Erro grave! A Kext RealtekPCI-E_Version.kext não foi gerada."
            exit 1
          fi

      - name: Obter Git Hash e UUID
        id: ids
        run: |
          echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          KEXT_BIN="RealtekPCI-E_Version.kext/Contents/MacOS/RealtekPCI-E_Version"
          if [ -f "$KEXT_BIN" ]; then
            UUID=$(dwarfdump --uuid "$KEXT_BIN" | awk '{print $2}')
            echo "uuid=$UUID" >> $GITHUB_OUTPUT
          else
            echo "uuid=nobin" >> $GITHUB_OUTPUT
          fi

      - name: Compactar Artefato (.zip)
        run: |
          ZIP_NAME="RealtekPCI-E_Version_${{ steps.ids.outputs.hash }}_${{ steps.ids.outputs.uuid }}.zip"
          zip -r -1 "${{ runner.temp }}/$ZIP_NAME" RealtekPCI-E_Version.kext > /dev/null
          echo "ZIP_PATH=${{ runner.temp }}/$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload do Artefato
        uses: actions/upload-artifact@v4
        with:
          name: RealtekPCI-E_Version_${{ steps.ids.outputs.hash }}_${{ steps.ids.outputs.uuid }}
          path: ${{ env.ZIP_PATH }}
