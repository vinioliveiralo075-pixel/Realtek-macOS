name: Build Realtek Kext

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. Garante as pastas e symlinks necessários
      - name: Prepare symlinks
        run: |
          ln -sf rtl8723be rtl8723ae || true

      # 3. Compila o projeto usando o Xcode
      - name: Build Kext
        run: |
          xcodebuild -project *.xcodeproj -scheme itlwm -configuration Release build || make

      # 4. Compacta o resultado em ZIP
      - name: Compress Artifacts
        run: |
          mkdir -p build/Artifacts
          if [ -d "build/Release/itlwm.kext" ]; then
            cd build/Release && zip -r ../Artifacts/itlwm-Realtek.zip itlwm.kext
          else
            zip -r build/Artifacts/itlwm-Realtek.zip *.kext || echo "Verifique a pasta de saída do build"
          fi

      # 5. Disponibiliza o ZIP para download na aba Actions
      - name: Upload Kext Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Realtek-WiFi-Kext
          path: build/Artifacts/*.zip
