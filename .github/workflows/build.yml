name: Build RealtekPCI-E_Version Kext

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-driver:
    runs-on: macos-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download dos Firmwares Realtek (Linux Kernel)
        run: |
          mkdir -p firmware
          cd firmware
          for fw in rtw8723b_fw.bin rtw8822b_fw.bin rtw8821c_fw.bin; do
            if [ ! -s "$fw" ]; then
              curl -sLO "https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain/rtw88/$fw" || true
            fi
          done
          ls -lh *.bin || true

      - name: Compilar Kext (SDK Nativo - Target macOS 11.0)
        run: |
          cd linux
          
          # Pega o SDK nativo mais rápido da maquina virtual
          export SDKPATH=$(xcrun --sdk macosx --show-sdk-path)
          
          # Target fixado em macOS 11.0 (Big Sur) para rodar do Big Sur ao Ventura
          # -w esconde os warnings e -fmax-errors=1 limita a exibição ao 1º erro
          export CFLAGS="-w -fmax-errors=1 -mmacosx-version-min=11.0 -isysroot $SDKPATH"
          
          make clean > /dev/null 2>&1
          
          # Filtra para exibir EXCLUSIVAMENTE erros de compilação reais
          make -j$(sysctl -n hw.ncpu) 2>&1 | grep -E "error:|fatal error:" || true
          
          if [ ! -d "RealtekPCI-E_Version.kext" ]; then
            echo "❌ Erro grave! A Kext não foi gerada."
            exit 1
          fi

      - name: Obter Git Hash e UUID
        id: ids
        run: |
          echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          KEXT_BIN="linux/RealtekPCI-E_Version.kext/Contents/MacOS/RealtekPCI-E_Version"
          if [ -f "$KEXT_BIN" ]; then
            UUID=$(dwarfdump --uuid "$KEXT_BIN" | awk '{print $2}')
            echo "uuid=$UUID" >> $GITHUB_OUTPUT
          else
            echo "uuid=nobin" >> $GITHUB_OUTPUT
          fi

      - name: Compactar Artefato (.zip)
        run: |
          cd linux
          ZIP_NAME="RealtekPCI-E_Version_${{ steps.ids.outputs.hash }}_${{ steps.ids.outputs.uuid }}.zip"
          zip -r -1 "${{ runner.temp }}/$ZIP_NAME" RealtekPCI-E_Version.kext > /dev/null
          echo "ZIP_PATH=${{ runner.temp }}/$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload do Artefato Final
        uses: actions/upload-artifact@v4
        with:
          name: RealtekPCI-E_Version_${{ steps.ids.outputs.hash }}
          path: ${{ env.ZIP_PATH }}
