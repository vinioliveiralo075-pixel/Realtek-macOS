name: Build RTL8723BE Kext
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-driver:
    runs-on: macos-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Compilar Kext para Monterey e Ventura
        run: |
          cd linux/rtl8723be
          # Configura o caminho do SDK do macOS e a flag APPLE
          export SDKROOT=$(xcrun --sdk macosx --show-sdk-path)
          export MACOSX_DEPLOYMENT_TARGET=12.0
          
          # Compila com suporte ao IOKit e emulação ativada
          make CFLAGS="-target x86_64-apple-macos12 -DAPPLE -isysroot $SDKROOT" LDFLAGS="-target x86_64-apple-macos12 -isysroot $SDKROOT"

      - name: Compactar Kext Corretamente
        run: |
          cd linux/rtl8723be
          zip -r ../../RTL8723BE_MacDriver.kext.zip RTL8723BE_MacDriver.kext

      - name: Upload do Artefato (Kext)
        uses: actions/upload-artifact@v4
        with:
          name: RTL8723BE_MacDriver_Monterey_Ventura
          path: RTL8723BE_MacDriver.kext.zip
