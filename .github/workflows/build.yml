name: Build RTL8723BE Kext
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-driver:
    runs-on: macos-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Compilar Kext
        run: |
          cd linux/rtl8723be
          make

      # Criamos o zip manualmente preservando a estrutura da pasta .kext
      - name: Compactar Kext Corretamente
        run: |
          cd linux/rtl8723be
          zip -r ../../RTL8723BE_MacDriver.kext.zip RTL8723BE_MacDriver.kext

      - name: Upload do Artefato (Kext)
        uses: actions/upload-artifact@v4
        with:
          name: RTL8723BE_MacDriver_Release
          path: RTL8723BE_MacDriver.kext.zip
