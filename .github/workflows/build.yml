name: Build RTL8723BE Kext

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Manage Version & Commit Info
        run: |
          GIT_SHA="$(git rev-parse --short HEAD)"
          echo "SHORT_SHA=$GIT_SHA" >> $GITHUB_ENV
          echo "Compilando commit: $GIT_SHA"

      - name: Install MacKernelSDK
        run: |
          git clone --depth=1 https://github.com/acidanthera/MacKernelSDK.git

      - name: Prepare Symlinks
        run: |
          cd linux
          ln -sf rtl8723be rtl8723ae || true

      - name: Build Kext
        run: |
          cd linux
          make clean || true
          
          # Descobre o caminho dinâmico do SDK no macOS do GitHub Actions
          SDK_DIR=$(xcrun --sdk macosx --show-sdk-path)
          
          # Executa o make passando as pastas de headers para resolver o sys/cdefs.h
          make CFLAGS="-mkernel -arch x86_64 -nostdinc -target x86_64-apple-macos11 \
            -I$SDK_DIR/System/Library/Frameworks/Kernel.framework/Headers \
            -I$SDK_DIR/usr/include \
            -I$GITHUB_WORKSPACE/MacKernelSDK/Headers \
            -I. -Irtl8723be -Irtl8723com -Ibtcoexist \
            -DKERNEL -DKERNEL_PRIVATE -fno-builtin -DCONFIG_RTLWIFI_DEBUG -DBT_SUPPORT=1 -DCOEX_SUPPORT=1"

      - name: Pack Artifacts
        run: |
          cd linux
          if [ -d "RTL8723BE_MacDriver.kext" ]; then
            zip -r ../RTL8723BE-v1.0-${SHORT_SHA}.zip RTL8723BE_MacDriver.kext
          else
            zip -r ../RTL8723BE-v1.0-${SHORT_SHA}.zip *.kext || zip -r ../RTL8723BE-v1.0-${SHORT_SHA}.zip *.o
          fi

      - name: Upload Kext Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RTL8723BE-MacDriver-${{ env.SHORT_SHA }}
          path: RTL8723BE-v1.0-*.zip
