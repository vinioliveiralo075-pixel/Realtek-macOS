name: Build RTL8723BE Kext
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-driver:
    runs-on: macos-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      # Forçamos o compilador a gerar o binário compatível desde o Monterey (12.0)
      # e usando o padrão de arquitetura x86_64 pura para Hackintosh Intel.
       Kino: Compilar Kext para Monterey e Ventura
        run: |
          cd linux/rtl8723be
          export MACOSX_DEPLOYMENT_TARGET=12.0
          make CFLAGS="-target x86_64-apple-macos12" LDFLAGS="-target x86_64-apple-macos12"

      - name: Compactar Kext Corretamente
        run: |
          cd linux/rtl8723be
          zip -r ../../RTL8723BE_MacDriver.kext.zip RTL8723BE_MacDriver.kext

      - name: Upload do Artefato (Kext)
        uses: actions/upload-artifact@v4
        with:
          name: RTL8723BE_MacDriver_Monterey_Ventura
          path: RTL8723BE_MacDriver.kext.zip
